name: Setup Rust with cache
description: Install the pinned Rust toolchain and restore the shared build cache.

inputs:
  source-root:
    description: Workspace-relative checkout whose Rust toolchain and lockfile apply.
    required: false
    default: '.'
  save-cache:
    description: Also save the cache at job end. Enable in exactly one job per
      pipeline so parallel jobs do not race on the same key.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      shell: bash
      run: rustup show
      working-directory: ${{ inputs.source-root }}

    - name: Restore and save Rust build cache
      if: inputs.save-cache == 'true'
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/git/db
          ~/.cargo/registry/cache
          ~/.cargo/registry/index
          ${{ inputs.source-root }}/target
        key: >-
          rust-${{ runner.os }}-${{ hashFiles(format('{0}/rust-toolchain.toml', inputs.source-root), format('{0}/Cargo.lock', inputs.source-root)) }}
        restore-keys: |
          rust-${{ runner.os }}-

    - name: Restore Rust build cache
      if: inputs.save-cache != 'true'
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/git/db
          ~/.cargo/registry/cache
          ~/.cargo/registry/index
          ${{ inputs.source-root }}/target
        key: >-
          rust-${{ runner.os }}-${{ hashFiles(format('{0}/rust-toolchain.toml', inputs.source-root), format('{0}/Cargo.lock', inputs.source-root)) }}
        restore-keys: |
          rust-${{ runner.os }}-
